<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taix 安装程序</title>
<style>

:root {

  --primary:       #0078D4;
  --primary-hover: #106EBE;
  --primary-light: rgba(0, 120, 212, 0.10);
  --primary-glow:  rgba(0, 120, 212, 0.20);
  --bg:            #F7F7FA;
  --card:          #FFFFFF;
  --card-border:   rgba(0,0,0,0.06);
  --card-shadow:   0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
  --text:          #1F1F1F;
  --text-secondary:#6B6B6B;
  --text-muted:    #9A9A9A;
  --divider:       rgba(0,0,0,0.06);
  --success:       #4CAF50;
  --success-bg:    rgba(76,175,80,0.08);
  --error:         #E53935;
  --error-bg:      rgba(229,57,53,0.06);
  --progress-bg:   #E8E8ED;


  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;overflow:hidden;
  font-family:"Segoe UI Variable Text","Segoe UI","Microsoft YaHei",system-ui,sans-serif;
  font-size:14px;color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  user-select:none;
}


.app{
  display:flex;flex-direction:column;
  height:100vh;width:100vw;
  background:var(--bg);
  position:relative;
}

.main-content{
  flex:1;
  display:flex;
  gap:0;
  padding:24px 28px 0;
  min-height:0;
}


.brand-panel{
  width:140px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-shrink:0;
  padding-bottom:14px;
}

.app-icon{
  width:72px;height:72px;
  border-radius:18px;
  background:#E8E8ED;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 20px rgba(0,120,212,0.30);
  transition:transform 0.3s var(--ease);
}
.app-icon svg{width:36px;height:36px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.app-icon img{width:36px;height:36px;border-radius:4px}
.app-icon:hover{transform:scale(1.03)}

.app-name{font-size:20px;font-weight:650;color:var(--text);letter-spacing:-0.3px}
.app-desc{font-size:12px;color:var(--text-secondary);line-height:1.4;text-align:center}


.divider{
  width:1px;
  background:var(--divider);
  margin:0 28px;
  flex-shrink:0;
}


.action-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
  padding-bottom:12px;
}


.path-group{margin-bottom:6px}
.path-label{
  font-size:11px;font-weight:550;
  color:var(--text-muted);letter-spacing:0.3px;
  text-transform:uppercase;margin-bottom:6px;
}
.path-row{display:flex;gap:6px}
.path-input{
  flex:1;height:34px;padding:0 12px;
  border:1px solid var(--divider);border-radius:var(--radius-sm);
  background:var(--card);font-size:13px;color:var(--text);
  outline:none;font-family:inherit;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.path-input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-light);
}
.path-input:disabled{
  opacity:0.4;background:#F2F2F6;
}
.btn-browse{
  width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--divider);border-radius:var(--radius-sm);
  background:var(--card);cursor:pointer;
  transition:all 0.15s;color:var(--text-secondary);
}
.btn-browse svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.btn-browse:hover{background:#F0F0F5;color:var(--text);border-color:rgba(0,0,0,0.12)}
.btn-browse:active{transform:scale(0.94)}


.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{height:36px;border-radius:var(--radius-sm);font-size:13px;font-weight:550;
     font-family:inherit;cursor:pointer;transition:all 0.18s;
     display:inline-flex;align-items:center;justify-content:center;gap:6px;
     padding:0 20px;border:none;outline:none;flex-shrink:0}

.btn-primary{
  width:100%;
  flex:1;
  background:var(--primary);color:#fff;
  box-shadow:0 2px 8px var(--primary-glow);
}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 3px 12px var(--primary-glow)}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{background:#D2D2D7;color:#AEAEB2;box-shadow:none;cursor:not-allowed;transform:none}

.btn-secondary{
  background:transparent;color:var(--text-secondary);padding:0 14px;
}
.btn-secondary:hover{background:var(--primary-light);color:var(--primary)}
.btn-secondary:active{transform:scale(0.97)}

.btn-spinner{
  width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.25);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.6s linear infinite;
  display:none;
}
.btn.loading .btn-spinner{display:inline-block}
.btn.loading .btn-text{opacity:0.75}
@keyframes spin{to{transform:rotate(360deg)}}


.status-row{
  display:flex;align-items:center;gap:6px;
  margin-top:12px;min-height:18px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--primary);
  animation:pulse 1.2s ease-in-out infinite;
  flex-shrink:0;
}
.status-dot.ready{background:var(--success);animation:none}
.status-dot.error{background:var(--error);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.status-text{font-size:12px;color:var(--text-secondary)}

.err-bar{
  padding:7px 12px;border-radius:var(--radius-sm);
  font-size:12px;line-height:1.5;
  display:none;margin-top:8px;
  background:var(--error-bg);border:1px solid rgba(229,57,53,0.12);color:var(--error);
}


.progress-section{
  margin-top:12px;
  max-height:0;
  overflow:hidden;
  transition:max-height 0.4s var(--ease), opacity 0.3s ease;
  opacity:0;
}
.progress-section.open{
  max-height:210px;
  opacity:1;
}

.progress-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.progress-track{width:100%;height:4px;background:var(--progress-bg);border-radius:2px;overflow:hidden}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--primary),#8B7CFC);
  border-radius:2px;
  transition:width 0.35s ease;
  position:relative;
}
.progress-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
  animation:shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.progress-info{
  display:flex;justify-content:space-between;
  margin-top:4px;margin-bottom:8px;
}
.progress-pct{font-size:13px;color:var(--primary);font-weight:550}
.progress-step{font-size:11px;color:var(--text-muted)}

.progress-log{
  height:52px;overflow-y:auto;
  padding:6px 10px;
  background:#F2F2F6;border-radius:var(--radius-sm);
  font-family:"Cascadia Code","Consolas",monospace;
  font-size:11px;line-height:1.7;color:var(--text-secondary);
}
.progress-log::-webkit-scrollbar{width:3px}
.progress-log::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:2px}


.finish-section{
  margin-top:12px;
  max-height:0;overflow:hidden;
  transition:max-height 0.45s var(--ease), opacity 0.35s ease;
  opacity:0;
}
.finish-section.open{
  max-height:140px;
  opacity:1;
}
.finish-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:var(--success-bg);
  border:1px solid rgba(76,175,80,0.15);
  border-radius:var(--radius-md);
}
.finish-icon{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--success),#66BB6A);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(76,175,80,0.25);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.finish-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.finish-title{font-size:14px;font-weight:650;color:var(--text)}
.finish-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-top:1px}


.bottom-bar{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:12px 28px;border-top:1px solid var(--divider);
  flex-shrink:0;
}
.bottom-link{
  font-size:11px;color:var(--text-muted);
  text-decoration:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  transition:color 0.15s;
}
.bottom-link:hover{color:var(--text-secondary)}


.license-popup{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  width:calc(100% - 80px);max-width:420px;max-height:180px;
  background:var(--card);border:1px solid var(--divider);
  border-radius:var(--radius-md);
  box-shadow:0 8px 28px rgba(0,0,0,0.10);
  padding:12px 16px;overflow-y:auto;
  display:none;z-index:10;
}
.license-popup.open{display:block}
.license-popup .ln{
  display:block;font-family:"Cascadia Code","Consolas",monospace;
  font-size:10px;line-height:1.7;color:var(--text-secondary);
  text-indent:-18px;padding-left:18px;
}
.license-popup .ln::before{
  content:attr(data-n);display:inline-block;width:16px;
  color:#CCC;text-align:right;margin-right:6px;font-size:9px;text-indent:0;
}
.license-popup .hi{color:var(--primary);font-weight:600}
.license-popup .co{color:var(--text-muted);font-style:italic}


.hidden{display:none!important}
</style>
</head>

    <!-- divider -->
    <div class="divider"></div>

    <!-- right: actions -->
    <div class="action-panel" id="actionPanel">
      <!-- install path -->
      <div class="path-group">
        <div class="path-label">安装位置</div>
        <div class="path-row">
          <input type="text" class="path-input" id="pathInput" readonly>
          <button class="btn-browse" id="browseBtn" title="浏览文件夹" onclick="send('browse_dir',{default:S.dir})">
            <svg viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          </button>
        </div>
      </div>

      <!-- action buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="actionBtn" onclick="handleAction()">
          <span class="btn-spinner"></span>
          <span class="btn-text" id="actionText">安装</span>
        </button>
      </div>

      <!-- status & error -->
      <div class="status-row" id="statusRow">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">正在检测环境...</span>
      </div>
      <div class="err-bar" id="errBar"></div>

      <!-- progress section (inline, collapsed) -->
      <div class="progress-section" id="progressSection">
        <div class="progress-title" id="progressTitle">正在安装...</div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-info">
          <span class="progress-step" id="progressStep"></span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-log" id="progressLog"></div>
      </div>

      <!-- finish section (inline, collapsed) -->
      <div class="finish-section" id="finishSection">
        <div class="finish-card">
          <div class="finish-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <div class="finish-title" id="finishTitle">安装完成！</div>
            <div class="finish-desc" id="finishDesc">Taix 已成功安装到您的计算机。</div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="bottom-bar">
    <span class="bottom-link" onclick="toggleLicense()">
      <svg viewBox="0 0 24 24" width="12" height="12" style="vertical-align:-2px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>

    </span>
    <a class="bottom-link" href="https://github.com/NLick47/Taix" target="_blank" onclick="send('open_link',{url:'https://github.com/NLick47/Taix'});return false">
      <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>

<script>

var S={hp:false,ex:null,dd:'',dir:'',act:'install',busy:false};
var $=function(id){return document.getElementById(id)};

function send(c,p){
  try{window.ipc.postMessage(JSON.stringify({cmd:c,payload:p||{}}))}catch(e){}
}


function toggleLicense(){
  $('licensePopup').classList.toggle('open');
}

var L=[
  ['hi','MIT License'],[''],['co','Copyright (c) 2024 to_mo_to'],[''],
  ['','Permission is hereby granted, free of charge, to any'],
  ['','person obtaining a copy of this software and associated'],
  ['','documentation files (the "Software"), to deal in the'],
  ['','Software without restriction, including without limitation'],
  ['','the rights to use, copy, modify, merge, publish,'],
  ['','distribute, sublicense, and/or sell copies of the'],
  ['','Software, and to permit persons to whom the Software'],
  ['','is furnished to do so, subject to the following'],
  ['','conditions:'],[''],
  ['','The above copyright notice and this permission notice'],
  ['','shall be included in all copies or substantial portions'],
  ['','of the Software.'],[''],

  ['','ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED'],

  ['','PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT'],

  ['','CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION'],
  ['','OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR'],
  ['','IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER'],
  ['','DEALINGS IN THE SOFTWARE.']
];
(function(){
  var h='';L.forEach(function(r,i){
    var c=r[0]?' class="'+r[0]+'"':'';
    h+='<span class="ln" data-n="'+(i+1)+'"'+c+'>'+(r[1]||' ')+'</span>';
  });
  $('licenseText').innerHTML=h;
})();


window.onRustMessage=function(d){
  if(typeof d==='string'){try{d=JSON.parse(d)}catch(e){return}}
  switch(d.type){
    case 'status':
      S.hp=d.has_payload;S.ex=d.existing_install||null;
      S.dd=d.default_dir||'';S.dir=S.ex||S.dd;
      $('pathInput').value=S.dir;
      if(!S.hp){
        setStatus('error','安装程序无效，请重新下载');
        $('statusDot').style.display='';
        $('actionBtn').disabled=true;
      }else if(S.ex){
        setStatus('ready','已安装 — '+S.ex);
        setAction('update');
      }else{
        setStatus('ready','准备安装');
        setAction('install');
      }
      break;

    case 'progress':
      var t=d.total>0?Math.round(d.step/d.total*100):5;if(t<5)t=5;
      $('progressFill').style.width=t+'%';
      $('progressPct').textContent=t+'%';
      $('progressStep').textContent='步骤 '+d.step+'/'+d.total;
      log('['+d.step+'/'+d.total+'] '+d.message);
      break;

    case 'extracting':
      log('正在解压...');
      break;

    case 'complete':
      $('progressFill').style.width='100%';
      $('progressPct').textContent='100%';
      setTimeout(function(){
        var act=S.act;
        $('progressSection').classList.remove('open');
        $('finishTitle').textContent=act==='uninstall'?'卸载完成！':'安装完成！';
        $('finishDesc').textContent=d.message||'操作已成功完成。';
        $('finishSection').classList.add('open');
        setFinished();
      },400);
      S.busy=false;
      break;

    case 'error':
      $('errBar').textContent=d.message||'操作失败';
      $('errBar').style.display='block';
      $('actionBtn').disabled=false;
      $('actionBtn').classList.remove('loading');
      $('actionText').textContent='重试';
      setStatus('error','操作失败');
      S.busy=false;
      break;

    case 'dir_selected':
      if(d.path){S.dir=d.path;$('pathInput').value=d.path}
      break;
    case 'link_opened':
      // no-op
      break;
    case 'confirm_close':
      if(confirm('操作正在运行中，确定要关闭窗口吗？')){
        send('force_close');
      }
      break;
  }
};


function setStatus(type,msg){
  var dot=$('statusDot');
  dot.className='status-dot';
  if(type==='ready'){dot.classList.add('ready');dot.style.display=''}
  else if(type==='error'){dot.classList.add('error');dot.style.display=''}
  else dot.style.display='';  /* pulse */
  $('statusText').textContent=msg;
}

function setAction(a){
  S.act=a;
  var lb={install:'安装',update:'更新',uninstall:'卸载'};
  $('actionText').textContent=lb[a]||'安装';
  var u=a==='uninstall';
  $('browseBtn').disabled=u;
  $('pathInput').disabled=u;
  if(u&&S.ex){$('pathInput').value=S.ex;S.dir=S.ex}
  else{$('pathInput').value=S.dir}
}

function log(m){
  var e=$('progressLog');
  e.innerHTML+='<div>'+m+'</div>';
  e.scrollTop=e.scrollHeight;
}

function setFinished(){
  $('actionText').textContent='完成';
  $('actionBtn').classList.remove('loading');
  $('actionBtn').disabled=false;
  $('actionBtn').onclick=function(){send('close')};
  S.finished=true;
}


function handleAction(){
  if(S.busy)return;

  /* if already finished — close */
  if(S.finished){send('close');return}

  S.busy=true;
  $('errBar').style.display='none';

  /* reset progress UI */
  var ps=$('progressSection');
  var fs=$('finishSection');
  fs.classList.remove('open');
  ps.classList.add('open');
  $('progressLog').innerHTML='';
  $('progressFill').style.width='0%';
  $('progressPct').textContent='0%';
  $('progressStep').textContent='';

  /* button state */
  $('actionBtn').classList.add('loading');
  $('actionBtn').disabled=true;

  var t={install:'正在安装...',update:'正在更新...',uninstall:'正在卸载...'};
  $('progressTitle').textContent=t[S.act]||'正在执行...';

  send(S.act,{dir:S.dir||S.dd});
}


send('get_status');
</script>
