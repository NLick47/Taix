name: Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            taix-server
            taix-monitor-windows
            taix-shell

      - name: Set APP_VERSION environment variable
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match '^refs/tags/v') {
            $appVersion = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $appVersion = '0.0.0'
          }
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$appVersion"

      - name: Build Rust taix-server
        run: |
          cd taix-server
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-monitor-windows
        run: |
          cd taix-monitor-windows
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-shell
        run: |
          cd taix-shell
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build and Publish .NET Client
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishAot=true -p:DebugType=None -p:DebugSymbols=false Taix.Client/Taix.Client.csproj -o ./publish

      - name: Copy Rust binaries and resources
        shell: pwsh
        run: |
          $publishDir = "./publish"
          Copy-Item "taix-server/target/x86_64-pc-windows-msvc/release/taix-server.exe"       -Destination $publishDir -Force
          Copy-Item "taix-monitor-windows/target/x86_64-pc-windows-msvc/release/taix-monitor-windows.exe" -Destination $publishDir -Force
          Copy-Item "taix-shell/target/x86_64-pc-windows-msvc/release/taix-shell.exe"         -Destination $publishDir -Force
          if (Test-Path "taix-shell/resources") {
            Copy-Item "taix-shell/resources" -Destination $publishDir -Recurse -Force
          }

      - name: Remove debug symbol files
        shell: pwsh
        run: |
          Get-ChildItem -Path ./publish -Recurse -Include "*.pdb" -File | Remove-Item -Force

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Download previous releases for delta packaging
        shell: pwsh
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./releases --token ${{ secrets.GITHUB_TOKEN }} 2>$null
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { Write-Host "No previous release found, will create full package only." }

      - name: Pack with Velopack
        shell: pwsh
        run: |
          vpk pack `
            --packId nlick47.taix `
            --packVersion ${{ env.APP_VERSION }} `
            --packDir ./publish `
            --mainExe Taix.exe `
            --outputDir ./releases `
            --icon Taix.Client/Resources/Icons/tai.ico `
            --packTitle "Taix"

      - name: Upload to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          $notes = Get-Content -Raw release_notes.txt -ErrorAction SilentlyContinue
          if (-not $notes) { $notes = "Release ${{ github.ref_name }}" }
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --outputDir ./releases `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --publish `
            --tag ${{ github.ref_name }} `
            --releaseName "Taix ${{ github.ref_name }}" `
            --releaseNotes $notes
