name: Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        cpu: [ x64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          rustflags: ""

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            taix-server
            taix-monitor-windows
            taix-shell
            taix-installer

      - name: Set APP_VERSION environment variable
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match '^refs/tags/v') {
            $appVersion = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $appVersion = '0.0.0'
          }
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$appVersion"

      - name: Build Rust taix-server
        run: |
          cd taix-server
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-monitor-windows
        run: |
          cd taix-monitor-windows
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-shell
        run: |
          cd taix-shell
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build and Publish .NET Client
        run: |
          Write-Host "Publishing with AOT enabled"
          dotnet publish -c Release -r win-${{ matrix.cpu }} --self-contained true -p:PublishAot=true -p:DebugType=None -p:DebugSymbols=false -p:AssemblyTitle=Taix -p:Product=Taix Taix.Client/Taix.Client.csproj -o ./output/${{ matrix.cpu }}

      - name: Copy Rust binaries
        shell: pwsh
        run: |
          $publishDir = "./output/${{ matrix.cpu }}"

          Copy-Item "taix-server/target/x86_64-pc-windows-msvc/release/taix-server.exe"       -Destination $publishDir -Force
          Copy-Item "taix-monitor-windows/target/x86_64-pc-windows-msvc/release/taix-monitor-windows.exe" -Destination $publishDir -Force
          Copy-Item "taix-shell/target/x86_64-pc-windows-msvc/release/taix-shell.exe"         -Destination $publishDir -Force

          Copy-Item "taix-shell/resources" -Destination $publishDir -Recurse -Force

          # Remove macOS-only files
          Get-ChildItem -Path "$publishDir/resources" -Recurse -Include "*.icns" -File | Remove-Item -Force

      - name: Remove debug symbol files
        shell: pwsh
        run: |
          $publishDir = "./output/${{ matrix.cpu }}"
          Get-ChildItem -Path $publishDir -Recurse -Include "*.pdb" -File | ForEach-Object {
            Remove-Item $_.FullName -Force
            Write-Host "Removed PDB: $($_.FullName)"
          }

      - name: Install 7-Zip for ultra compression
        shell: pwsh
        run: |
          choco install 7zip -y
          # 确保 7z 命令可用
          7z | Out-Null
          Write-Host "7-Zip installed successfully"

      - name: Build Installer
        shell: bash
        run: |
          bash taix-installer/build-installer.sh "output/${{ matrix.cpu }}" "${{ env.APP_VERSION }}" "."

      - name: Create ZIP
        shell: pwsh
        run: |
          $publishDir = "./output/${{ matrix.cpu }}"

          # 复制安装卸载脚本（绿色版用）
          Copy-Item "script/install.ps1" -Destination $publishDir -Force
          Copy-Item "script/uninstall.ps1" -Destination $publishDir -Force

          $zipName = "Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}"
          Push-Location $publishDir
          Compress-Archive -Path "*" -DestinationPath "../../$zipName.zip"
          Pop-Location
          Write-Host "Created $zipName.zip"

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}-Setup
          path: Taix-${{ env.APP_VERSION }}-Setup.exe

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}
          path: Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          rustflags: ""

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            taix-server
            taix-shell

      - name: Set APP_VERSION
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${{ github.ref_name }}"
            echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=0.0.0" >> $GITHUB_ENV
          fi

      - name: Build taix-server
        run: cd taix-server && cargo build --release --target aarch64-apple-darwin

      - name: Build taix-shell
        run: cd taix-shell && cargo build --release --target aarch64-apple-darwin

      - name: Build taix-monitor-macos
        run: cd taix-monitor-macos && swift build -c release --arch arm64

      - name: Publish .NET Client (AOT)
        run: |
          dotnet publish Taix.Client/Taix.Client.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishAot=true -p:StripSymbols=true \
            -p:AssemblyTitle=Taix -p:Product=Taix \
            -o ./output/macos

      - name: Strip debug symbols from Swift binary
        run: |
          strip taix-monitor-macos/.build/release/taix-monitor
          echo "Stripped Swift binary: $(ls -lh taix-monitor-macos/.build/release/taix-monitor | awk '{print $5}')"

      - name: Build DMG
        run: |
          chmod +x taix-installer/build-dmg.sh
          ./taix-installer/build-dmg.sh "${{ env.APP_VERSION }}" "taix-installer" "aarch64-apple-darwin"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-macos-arm64
          path: taix-installer/Taix-${{ env.APP_VERSION }}-macos-arm64.dmg

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taix-browser-extension/package-lock.json

      - name: Read extension version
        id: ext-version
        working-directory: taix-browser-extension
        run: |
          EXT_VERSION=$(node -p "require('./package.json').version")
          echo "EXT_VERSION=$EXT_VERSION" >> $GITHUB_ENV
          echo "Extension version: $EXT_VERSION"

      - name: Install dependencies
        working-directory: taix-browser-extension
        run: npm ci

      - name: Sync manifest version
        working-directory: taix-browser-extension
        run: |
          for f in manifests/manifest.*.json; do
            node -e "const fs=require('fs');const p='$f';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.EXT_VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          done

      - name: Build Chrome extension
        working-directory: taix-browser-extension
        run: npm run build:chrome

      - name: Create Chrome extension ZIP
        run: |
          ZIP_NAME="Taix-Web-Sentry-${{ env.EXT_VERSION }}-chrome.zip"
          cd taix-browser-extension/dist/chrome
          zip -r "../../../$ZIP_NAME" .
          cd -
          ls -lh "$ZIP_NAME"

      - name: Upload Chrome extension ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Taix-Web-Sentry-${{ env.EXT_VERSION }}-chrome
          path: Taix-Web-Sentry-${{ env.EXT_VERSION }}-chrome.zip

  release:
    needs: [build-windows, build-macos, build-extension]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set APP_VERSION
        run: |
          VERSION="${{ github.ref_name }}"
          echo "APP_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Read extension version
        run: |
          EXT_VERSION=$(node -p "require('./taix-browser-extension/package.json').version")
          echo "EXT_VERSION=$EXT_VERSION" >> $GITHUB_ENV

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-x64-Setup
          path: ./artifacts

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-x64
          path: ./artifacts

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-macos-arm64
          path: ./artifacts

      - name: Download Chrome extension ZIP
        uses: actions/download-artifact@v4
        with:
          name: Taix-Web-Sentry-${{ env.EXT_VERSION }}-chrome
          path: ./artifacts

      - name: Read release notes
        id: release-notes
        run: |
          if [ -f release_notes.txt ]; then
            echo "content<<EOF" >> $GITHUB_OUTPUT
            sed -e "s/{version}/${{ env.APP_VERSION }}/g" \
                -e "s/{ext_version}/${{ env.EXT_VERSION }}/g" \
                release_notes.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ env.APP_VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ./artifacts/*
          body: ${{ steps.release-notes.outputs.content }}
