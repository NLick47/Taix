name: Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        cpu: [ x64 ]
        kind: [ zip ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            taix-server
            taix-monitor-windows
            taix-shell
            taix-installer

      - name: Set APP_VERSION environment variable
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match '^refs/tags/v') {
            $appVersion = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $appVersion = '0.0.0'
          }
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$appVersion"

      - name: Build Rust taix-server
        run: |
          cd taix-server
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-monitor-windows
        run: |
          cd taix-monitor-windows
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build Rust taix-shell
        run: |
          cd taix-shell
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Build and Publish .NET Client
        run: |
          Write-Host "Publishing with AOT enabled"
          dotnet publish -c Release -r win-${{ matrix.cpu }} --self-contained true -p:PublishAot=true -p:DebugType=None -p:DebugSymbols=false Taix.Client/Taix.Client.csproj -o ./output/${{ matrix.cpu }}

      - name: Copy Rust binaries and scripts
        shell: pwsh
        run: |
          $publishDir = "./output/${{ matrix.cpu }}"

          # Copy Rust binaries
          Copy-Item "taix-server/target/x86_64-pc-windows-msvc/release/taix-server.exe"       -Destination $publishDir -Force
          Copy-Item "taix-monitor-windows/target/x86_64-pc-windows-msvc/release/taix-monitor-windows.exe" -Destination $publishDir -Force
          Copy-Item "taix-shell/target/x86_64-pc-windows-msvc/release/taix-shell.exe"         -Destination $publishDir -Force

          # Copy taix-shell resources (tray icon etc.)
          Copy-Item "taix-shell/resources" -Destination $publishDir -Recurse -Force

          # Copy install scripts
          Copy-Item "script/install.ps1"   -Destination $publishDir -Force
          Copy-Item "script/uninstall.ps1" -Destination $publishDir -Force

      - name: Remove debug symbol files
        shell: pwsh
        run: |
          $publishDir = "./output/${{ matrix.cpu }}"
          Get-ChildItem -Path $publishDir -Recurse -Include "*.pdb" -File | ForEach-Object {
            Remove-Item $_.FullName -Force
            Write-Host "Removed PDB: $($_.FullName)"
          }

      - name: Compress build artifacts
        shell: pwsh
        run: |
          $items = Get-ChildItem -Path ./output/${{ matrix.cpu }} | Select-Object -ExpandProperty FullName
          Compress-Archive -Path $items -DestinationPath ./output/Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}
          path: ./output/${{ matrix.cpu }}/**

      # ========== Installer Build ==========
      - name: Download UPX
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile "upx.zip"
          Expand-Archive -Path "upx.zip" -DestinationPath "." -Force
          New-Item -ItemType Directory -Path "taix-installer/tools" -Force | Out-Null
          Move-Item -Path "upx-4.2.4-win64/upx.exe" -Destination "taix-installer/tools/upx.exe" -Force

      - name: Build Installer
        shell: bash
        run: |
          bash taix-installer/build-installer.sh "output/${{ matrix.cpu }}" "${{ env.APP_VERSION }}" "."

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}-Setup
          path: Taix-${{ env.APP_VERSION }}-Setup.exe

      - name: Read release notes from file
        id: release-notes
        uses: juliangruber/read-file-action@v1
        with:
          path: release_notes.txt

      - name: Release
        uses: ncipollo/release-action@v1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          allowUpdates: true
          artifacts: |
            ./output/Taix-${{ env.APP_VERSION }}-win-${{ matrix.cpu }}.${{ matrix.kind }}
            ./Taix-${{ env.APP_VERSION }}-Setup.exe
          body: ${{ steps.release-notes.outputs.content }}